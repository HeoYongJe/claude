<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>여행하기 좋은 나라 | 환율 기반 추천</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <h1 class="header__title">여행하기 좋은 나라</h1>
    <p class="header__subtitle">지금, 원화로 더 유리해진 여행지는 어디일까?</p>
  </header>

  <main class="main">
    <div class="controls">
      <div class="controls__sort">
        <button id="sortFavorableBtn" class="sort-btn active" type="button">환율 유리한 순</button>
        <button id="sortRisingBtn" class="sort-btn" type="button">최근 상승폭 큰 순</button>
      </div>
      <p id="dateInfo" class="date-info"></p>
    </div>

    <p id="statusMessage" class="status-message"></p>

    <section id="cardGrid" class="card-grid" aria-live="polite"></section>

    <button id="showMoreBtn" class="show-more-btn" type="button" hidden>더보기</button>
  </main>

  <script src="js/currencyCountryMap.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
